<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#08080f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="CocoCaloro">
<title>CocoCaloro</title>
<link rel="manifest" href="manifest.json">
<style>
/* ── Reset & base ─────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08080f;
  --surface:#111118;
  --card:rgba(255,255,255,.055);
  --card-border:rgba(255,255,255,.09);
  --v1:#a78bfa;--v2:#f472b6;
  --green:#34d399;--amber:#fbbf24;--red:#f87171;--blue:#60a5fa;
  --text:#f1f5f9;--muted:#64748b;--muted2:#94a3b8;
  --nav-h:76px;--hdr-h:58px;
  --r:18px;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  overflow:hidden;font-size:15px}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative}

/* ── Background glow ──────────────────────────────────────────── */
#app::before{
  content:'';position:fixed;top:-120px;left:50%;transform:translateX(-50%);
  width:320px;height:320px;
  background:radial-gradient(circle,rgba(167,139,250,.12) 0%,transparent 70%);
  pointer-events:none;z-index:0}

/* ── Header ───────────────────────────────────────────────────── */
header{
  height:var(--hdr-h);display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;flex-shrink:0;position:relative;z-index:10}
.logo{font-size:21px;font-weight:800;letter-spacing:-.4px;
  background:linear-gradient(135deg,var(--v1),var(--v2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-date{font-size:12px;color:var(--muted2);font-weight:500}
.hdr-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);flex-shrink:0}

/* ── Scroll area ──────────────────────────────────────────────── */
#content{flex:1;overflow-y:auto;position:relative;z-index:1;
  padding-bottom:calc(var(--nav-h) + 12px);
  /* hide scrollbar */
  scrollbar-width:none}
#content::-webkit-scrollbar{display:none}

/* ── Bottom nav ───────────────────────────────────────────────── */
nav{
  height:var(--nav-h);flex-shrink:0;position:relative;z-index:10;
  padding:8px 16px 16px;display:flex;gap:2px;
  background:rgba(8,8,15,.85);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid rgba(255,255,255,.06)}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;border:none;background:none;cursor:pointer;color:var(--muted);
  font-size:10px;font-weight:600;letter-spacing:.2px;font-family:inherit;
  border-radius:12px;padding:6px 0;transition:all .2s;position:relative}
.nav-btn.active{color:var(--text)}
.nav-btn .nav-icon{
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;
  border-radius:8px;transition:all .2s}
.nav-btn.active .nav-icon{
  background:linear-gradient(135deg,var(--v1),var(--v2));
  box-shadow:0 4px 16px rgba(167,139,250,.35)}
.nav-btn svg{width:16px;height:16px;stroke-width:2.2}
.nav-btn.active svg{stroke:white}

/* ── Cards ────────────────────────────────────────────────────── */
.card{
  background:var(--card);
  border:1px solid var(--card-border);
  border-radius:var(--r);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.section{padding:0 16px;margin-top:16px}
.section-hdr{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px}
.section-title{font-size:11px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;color:var(--muted)}
.section-action{font-size:12px;color:var(--v1);font-weight:600}

/* ── Calorie hero ─────────────────────────────────────────────── */
.hero{padding:20px 16px 12px;display:flex;flex-direction:column;align-items:center}
.ring-wrap{position:relative;width:180px;height:180px;margin-bottom:4px}
.ring-wrap svg{position:absolute;inset:0}
.ring-bg{stroke:rgba(255,255,255,.07);stroke-width:14;fill:none}
.ring-track{fill:none;stroke-width:14;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.ring-center{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1px}
.ring-num{font-size:36px;font-weight:900;line-height:1;letter-spacing:-1px}
.ring-lbl{font-size:11px;color:var(--muted2);font-weight:500}
.ring-sub{margin-top:2px;font-size:13px;color:var(--muted2);text-align:center}

/* ── Macro row ────────────────────────────────────────────────── */
.macro-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px;margin-top:8px}
.macro-pill{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:14px;padding:12px 10px;display:flex;flex-direction:column;
  align-items:center;gap:3px;position:relative;overflow:hidden}
.macro-pill::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  border-radius:2px 2px 0 0}
.macro-pill.prot::before{background:var(--green)}
.macro-pill.carb::before{background:var(--amber)}
.macro-pill.fat::before{background:var(--red)}
.macro-val{font-size:20px;font-weight:800;line-height:1}
.macro-lbl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.3px;text-transform:uppercase}
.macro-pct{font-size:10px;color:var(--muted2);margin-top:1px}

/* ── Food log cards ───────────────────────────────────────────── */
.food-card{
  display:flex;align-items:center;gap:12px;padding:13px 16px;
  border-bottom:1px solid rgba(255,255,255,.05)}
.food-card:last-child{border-bottom:none}
.food-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.food-info{flex:1;min-width:0}
.food-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.food-chips{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.chip{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;color:var(--muted2);
  background:rgba(255,255,255,.06)}
.chip.p{color:var(--green);background:rgba(52,211,153,.1)}
.chip.c{color:var(--amber);background:rgba(251,191,36,.1)}
.chip.f{color:var(--red);background:rgba(248,113,113,.1)}
.food-kcal{font-size:16px;font-weight:800;
  background:linear-gradient(135deg,var(--v1),var(--v2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  white-space:nowrap}
.food-del{
  background:none;border:none;color:rgba(255,255,255,.2);cursor:pointer;
  font-size:20px;line-height:1;padding:2px 0 2px 6px;transition:color .15s}
.food-del:active{color:var(--red)}

/* ── Empty state ──────────────────────────────────────────────── */
.empty{padding:40px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-icon{width:56px;height:56px;border-radius:16px;
  background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.empty-icon svg{width:28px;height:28px;color:var(--muted)}
.empty h3{font-size:16px;font-weight:700}
.empty p{font-size:13px;color:var(--muted2);line-height:1.5;max-width:220px}

/* ── Add / scan tab ───────────────────────────────────────────── */
.scan-hero{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.scan-card{
  background:var(--card);border:1px solid var(--card-border);border-radius:var(--r);
  padding:22px 16px;display:flex;flex-direction:column;align-items:center;
  gap:10px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.scan-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(167,139,250,.08),rgba(244,114,182,.08));
  opacity:0;transition:opacity .18s}
.scan-card:active::after{opacity:1}
.scan-card:active{transform:scale(.97)}
.scan-icon{
  width:52px;height:52px;border-radius:14px;
  background:linear-gradient(135deg,var(--v1),var(--v2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(167,139,250,.3)}
.scan-icon svg{width:24px;height:24px;stroke:white;stroke-width:2}
.scan-card h3{font-size:14px;font-weight:700;text-align:center}
.scan-card p{font-size:11px;color:var(--muted2);text-align:center;line-height:1.4}
.scan-card.full{grid-column:1/-1;flex-direction:row;gap:14px;padding:16px}
.scan-card.full .scan-icon{width:44px;height:44px;border-radius:12px;flex-shrink:0}
.scan-card.full h3{text-align:left}
.scan-card.full p{text-align:left}
.scan-card.full .scan-text{flex:1}

/* ── Quick add from plan ──────────────────────────────────────── */
.qfood{
  display:flex;align-items:center;padding:11px 16px;gap:12px;
  border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;transition:background .15s}
.qfood:last-child{border-bottom:none}
.qfood:active{background:rgba(255,255,255,.04)}
.qfood-dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,var(--v1),var(--v2));flex-shrink:0}
.qfood-info{flex:1}
.qfood-name{font-size:13px;font-weight:600}
.qfood-meta{font-size:11px;color:var(--muted2);margin-top:1px}
.qfood-add{width:28px;height:28px;border-radius:8px;border:none;
  background:linear-gradient(135deg,var(--v1),var(--v2));cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qfood-add svg{width:14px;height:14px;stroke:white;stroke-width:2.5}

/* ── Progress tab ─────────────────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-top:16px}
.stat-box{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:16px}
.stat-val{font-size:28px;font-weight:900;letter-spacing:-1px}
.stat-lbl{font-size:11px;color:var(--muted2);margin-top:2px}
.stat-delta{font-size:12px;font-weight:600;margin-top:6px}

/* ── Measurements ─────────────────────────────────────────────── */
.meas-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-top:16px}
.meas-card{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:16px}
.meas-val{font-size:26px;font-weight:900;letter-spacing:-.5px}
.meas-unit{font-size:14px;font-weight:500;color:var(--muted2)}
.meas-lbl{font-size:11px;color:var(--muted2);margin-top:2px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.meas-delta{font-size:11px;font-weight:600;margin-top:5px}

/* ── Plan tab ─────────────────────────────────────────────────── */
.day-tabs{
  display:flex;gap:6px;padding:16px 16px 0;overflow-x:auto;
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{
  flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--card-border);
  background:var(--card);font-size:12px;font-weight:700;color:var(--muted);
  cursor:pointer;transition:all .15s;font-family:inherit}
.day-tab.active{
  background:linear-gradient(135deg,var(--v1),var(--v2));
  border-color:transparent;color:white;
  box-shadow:0 4px 14px rgba(167,139,250,.35)}
.meal-block{margin:12px 16px 0}
.meal-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.meal-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.meal-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted2)}
.meal-kcal-sum{margin-left:auto;font-size:12px;color:var(--muted);font-weight:500}
.plan-row{
  display:flex;align-items:center;padding:9px 14px;gap:10px;
  border-bottom:1px solid rgba(255,255,255,.05)}
.plan-row:last-child{border-bottom:none}
.plan-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0}
.plan-food-name{flex:1;font-size:13px;font-weight:500}
.plan-food-amt{font-size:11px;color:var(--muted2)}
.plan-food-k{font-size:13px;font-weight:700;color:var(--muted2)}

/* ── Segment control ──────────────────────────────────────────── */
.seg{
  display:flex;background:rgba(255,255,255,.06);border-radius:12px;
  padding:3px;margin:16px 16px 0}
.seg-btn{
  flex:1;padding:8px;border:none;background:none;
  border-radius:9px;font-size:13px;color:var(--muted);
  cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
.seg-btn.active{background:rgba(255,255,255,.1);color:var(--text)}

/* ── Sheet / modal ────────────────────────────────────────────── */
#overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  z-index:100;display:none;align-items:flex-end}
#overlay.show{display:flex}
.sheet{
  background:#13131f;border-top:1px solid rgba(255,255,255,.1);
  border-radius:24px 24px 0 0;padding:0;width:100%;
  max-height:92vh;overflow-y:auto;
  animation:slideup .28s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:40px;height:4px;background:rgba(255,255,255,.15);
  border-radius:2px;margin:12px auto 0}
.sheet-head{display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 12px}
.sheet-title{font-size:18px;font-weight:800;letter-spacing:-.3px}
.sheet-close{
  width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.08);
  border:none;color:var(--muted2);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1}
.sheet-body{padding:0 20px 32px}

/* ── Forms ────────────────────────────────────────────────────── */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.field input,.field select{
  width:100%;background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.1);border-radius:12px;
  padding:12px 14px;color:var(--text);font-size:15px;font-family:inherit;outline:none;
  transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--v1)}
.macro-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── Buttons ──────────────────────────────────────────────────── */
.btn-grad{
  width:100%;padding:14px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--v1),var(--v2));
  color:white;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
  box-shadow:0 4px 20px rgba(167,139,250,.3);transition:all .15s}
.btn-grad:active{transform:scale(.98);box-shadow:0 2px 12px rgba(167,139,250,.2)}
.btn-ghost{
  width:100%;padding:13px;border:1px solid rgba(255,255,255,.12);border-radius:14px;
  background:rgba(255,255,255,.05);color:var(--text);
  font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;
  margin-top:10px;transition:all .15s}
.btn-ghost:active{background:rgba(255,255,255,.09)}
.btn-green{
  width:100%;padding:14px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#34d399,#10b981);
  color:#0a0a0f;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
  box-shadow:0 4px 20px rgba(52,211,153,.25);transition:all .15s}
.btn-green:active{transform:scale(.98)}
.btn-sm{
  padding:9px 18px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--v1),var(--v2));
  color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}

/* ── Barcode / scanner ────────────────────────────────────────── */
#reader{width:100%;border-radius:14px;overflow:hidden;background:#000;min-height:220px;margin-bottom:12px}
#reader video{width:100%;border-radius:14px}
#scan-status{text-align:center;color:var(--muted2);font-size:13px;padding:4px 0 8px}

/* ── Nutrition confirm card ───────────────────────────────────── */
.confirm-macros{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  background:rgba(255,255,255,.05);border-radius:14px;padding:14px;margin:12px 0}
.cm-item{text-align:center}
.cm-val{font-size:18px;font-weight:800}
.cm-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-top:1px}

/* ── History list ─────────────────────────────────────────────── */
.hist-row{
  display:flex;align-items:center;padding:11px 16px;
  border-bottom:1px solid rgba(255,255,255,.05)}
.hist-row:last-child{border-bottom:none}
.hist-date{font-size:13px;color:var(--muted2);flex:1}
.hist-val{font-size:14px;font-weight:700}

/* ── SVG chart ────────────────────────────────────────────────── */
.chart-wrap{padding:4px 0 0;overflow-x:auto}
svg.chart{display:block;overflow:visible}

/* ── Weight entry inline ──────────────────────────────────────── */
.weight-entry{display:flex;gap:8px;padding:0 16px;margin-top:10px}
.weight-entry input{
  flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  border-radius:12px;padding:12px 14px;color:var(--text);font-size:15px;
  font-family:inherit;outline:none}
.weight-entry input:focus{border-color:var(--v1)}

/* ── Toast ────────────────────────────────────────────────────── */
#toast{
  position:fixed;top:calc(var(--hdr-h) + 8px);left:50%;
  transform:translateX(-50%) translateY(-10px);
  background:rgba(255,255,255,.12);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.15);border-radius:20px;
  padding:9px 18px;font-size:13px;font-weight:600;
  z-index:200;opacity:0;
  transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Scroll top padding ───────────────────────────────────────── */
.top-pad{height:4px}
.bot-pad{height:20px}

/* ── Search result rows ───────────────────────────────────────── */
.result-row{
  display:flex;align-items:center;gap:12px;padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;transition:opacity .15s}
.result-row:last-child{border-bottom:none}
.result-row:active{opacity:.7}
.result-dot{width:8px;height:8px;border-radius:50%;
  background:linear-gradient(135deg,var(--v1),var(--v2));flex-shrink:0}
.result-info{flex:1}
.result-name{font-size:14px;font-weight:600}
.result-meta{font-size:11px;color:var(--muted2);margin-top:2px}
.result-add{width:28px;height:28px;border-radius:8px;border:none;
  background:linear-gradient(135deg,var(--v1),var(--v2));
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.result-add svg{width:14px;height:14px;stroke:white;stroke-width:2.5}

/* ── Photo capture ────────────────────────────────────────────── */
#photo-preview{width:100%;border-radius:14px;margin-bottom:12px;display:none}
#ocr-status{text-align:center;color:var(--muted2);font-size:13px;padding:6px 0 4px;display:none}
.photo-upload-zone{
  border:2px dashed rgba(255,255,255,.12);border-radius:16px;
  padding:32px;text-align:center;cursor:pointer;transition:border-color .15s}
.photo-upload-zone:active{border-color:var(--v1)}
.photo-upload-zone svg{width:36px;height:36px;color:var(--muted);margin-bottom:8px}
.photo-upload-zone p{font-size:13px;color:var(--muted2)}

/* ── Divider ──────────────────────────────────────────────────── */
.divider{height:1px;background:rgba(255,255,255,.06);margin:0}

/* ── Voice Cook Mode ──────────────────────────────────────────── */
.voice-hero{
  margin:0 16px 10px;padding:18px;
  background:linear-gradient(135deg,rgba(167,139,250,.15),rgba(244,114,182,.1));
  border:1px solid rgba(167,139,250,.25);border-radius:20px;
  display:flex;align-items:center;gap:14px;cursor:pointer;
  transition:all .18s;position:relative;overflow:hidden}
.voice-hero::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(167,139,250,.08),rgba(244,114,182,.08));
  opacity:0;transition:opacity .18s}
.voice-hero:active::before{opacity:1}
.voice-hero:active{transform:scale(.98)}
.voice-hero-icon{
  width:56px;height:56px;border-radius:16px;flex-shrink:0;
  background:linear-gradient(135deg,var(--v1),var(--v2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 24px rgba(167,139,250,.4)}
.voice-hero-icon svg{width:26px;height:26px;stroke:white;stroke-width:2}
.voice-hero h2{font-size:16px;font-weight:800;margin-bottom:2px}
.voice-hero p{font-size:12px;color:var(--muted2);line-height:1.4}

/* mic button */
.mic-btn{
  width:80px;height:80px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--v1),var(--v2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 28px rgba(167,139,250,.45);
  transition:all .2s;flex-shrink:0}
.mic-btn:active{transform:scale(.93)}
.mic-btn svg{width:32px;height:32px;stroke:white;stroke-width:2}
.mic-btn.listening{
  animation:pulse-mic 1.4s ease-in-out infinite;
  background:linear-gradient(135deg,#f472b6,#f87171);}
@keyframes pulse-mic{
  0%,100%{box-shadow:0 0 0 0 rgba(244,114,182,.5)}
  50%{box-shadow:0 0 0 18px rgba(244,114,182,0)}}

/* transcript live preview */
.transcript-live{
  min-height:48px;background:rgba(255,255,255,.05);border-radius:12px;
  padding:10px 14px;font-size:14px;color:var(--muted2);font-style:italic;
  border:1px solid rgba(255,255,255,.07);line-height:1.5;margin-bottom:14px;
  transition:color .15s}
.transcript-live.final{color:var(--text);font-style:normal}

/* cook items */
.cook-item{
  display:flex;align-items:flex-start;gap:10px;padding:11px 0;
  border-bottom:1px solid rgba(255,255,255,.05)}
.cook-item:last-child{border-bottom:none}
.cook-badge{
  width:22px;height:22px;border-radius:6px;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;font-size:11px}
.cook-badge.ok{background:rgba(52,211,153,.15);color:#34d399}
.cook-badge.warn{background:rgba(251,191,36,.15);color:#fbbf24}
.cook-badge.err{background:rgba(248,113,113,.15);color:#f87171}
.cook-item-info{flex:1;min-width:0}
.cook-item-name{font-size:14px;font-weight:600}
.cook-item-sub{font-size:11px;color:var(--muted2);margin-top:2px}
.cook-item-kcal{font-size:14px;font-weight:800;color:var(--v1);white-space:nowrap}
.cook-scan-btn{
  padding:5px 10px;border:1px solid rgba(251,191,36,.3);border-radius:8px;
  background:rgba(251,191,36,.08);color:#fbbf24;font-size:11px;font-weight:700;
  cursor:pointer;font-family:inherit;white-space:nowrap}

/* cook totals bar */
.cook-totals{
  background:rgba(255,255,255,.05);border-radius:14px;
  padding:12px 14px;display:grid;grid-template-columns:repeat(4,1fr);
  gap:4px;text-align:center;margin-bottom:12px}
.ct-val{font-size:17px;font-weight:800}
.ct-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-top:1px}

/* ── Recipe cards ─────────────────────────────────────────────── */
.recipe-row{
  display:flex;align-items:center;gap:12px;padding:13px 16px;
  border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;transition:background .15s}
.recipe-row:last-child{border-bottom:none}
.recipe-row:active{background:rgba(255,255,255,.04)}
.recipe-icon{width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,rgba(167,139,250,.2),rgba(244,114,182,.2));
  border:1px solid rgba(167,139,250,.2);display:flex;align-items:center;
  justify-content:center;font-size:18px;flex-shrink:0}
.recipe-info{flex:1;min-width:0}
.recipe-name{font-size:14px;font-weight:700}
.recipe-meta{font-size:11px;color:var(--muted2);margin-top:2px}
.recipe-add{width:32px;height:32px;border-radius:9px;border:none;
  background:linear-gradient(135deg,var(--v1),var(--v2));
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.recipe-add svg{width:14px;height:14px;stroke:white;stroke-width:2.5}
.recipe-del{background:none;border:none;color:rgba(255,255,255,.2);
  cursor:pointer;font-size:20px;line-height:1;padding:4px;transition:color .15s}
.recipe-del:active{color:var(--red)}

/* ingredient row in recipe builder */
.ing-row{display:flex;align-items:center;gap:8px;padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.05)}
.ing-row:last-child{border-bottom:none}
.ing-name{flex:1;font-size:13px;font-weight:600}
.ing-amt{font-size:11px;color:var(--muted2)}
.ing-k{font-size:13px;font-weight:700;color:var(--muted2);min-width:44px;text-align:right}

/* ── Progress / History ───────────────────────────────────────── */
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-top:16px}
.ov-box{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:15px}
.ov-val{font-size:30px;font-weight:900;letter-spacing:-1px;line-height:1}
.ov-lbl{font-size:11px;color:var(--muted2);margin-top:3px;font-weight:500}
.ov-sub{font-size:11px;color:var(--muted);margin-top:6px}

.goal-row{display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.goal-row:last-child{border-bottom:none}
.goal-lbl{font-size:13px;color:var(--muted2)}
.goal-val{font-size:14px;font-weight:700}

.adh-bar{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-top:8px}
.adh-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--v1),var(--v2));transition:width .5s}

/* 30-day mini bars */
.mini-bar-wrap{display:flex;align-items:flex-end;gap:2px;height:60px;padding:0 2px}
.mini-bar{flex:1;border-radius:2px 2px 0 0;min-height:2px;transition:height .3s}

.week-avg-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.week-avg-row:last-child{border-bottom:none}
.week-avg-lbl{font-size:12px;color:var(--muted2)}
.week-avg-val{font-size:13px;font-weight:700}

/* streak flame */
.streak-flame{font-size:28px;line-height:1;margin-bottom:2px}

const S=load();
function todayLog(){if(!S.log[dk()])S.log[dk()]=[];return S.log[dk()]}
function totals(log){return log.reduce((a,e)=>({k:a.k+e.k,p:a.p+e.p,c:a.c+e.c,f:a.f+e.f}),{k:0,p:0,c:0,f:0})}

// ── Router ─────────────────────────────────────────────────────────────────────
let tab='today';
function go(t){
  tab=t;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+t);
  if(nb)nb.classList.add('active');
  render();
}

function render(){
  const el=document.getElementById('content');
  if(tab==='today')el.innerHTML=rToday();
  else if(tab==='scan')el.innerHTML=rScan();
  else if(tab==='progress')el.innerHTML=rProgress();
  else if(tab==='measure')el.innerHTML=rMeasure();
  else if(tab==='plan')el.innerHTML=rPlan();
}

// ── TODAY ──────────────────────────────────────────────────────────────────────
function rToday(){
  const log=todayLog();
  const tot=totals(log);
  const rem=T.kcal-tot.k;
  const pct=Math.min(tot.k/T.kcal,1);
  const circ=2*Math.PI*60;
  const over=tot.k>T.kcal;
  const ringColor=over?'url(#gRed)':pct>0.85?'url(#gAmber)':'url(#gViolet)';

  const macroP=v=>`${Math.round(Math.min(v,100))}%`;

  return `<div class="top-pad"></div>
  <!-- Calorie ring -->
  <div class="hero">
    <div class="ring-wrap">
      <svg viewBox="0 0 140 140" width="180" height="180" style="transform:rotate(-90deg)">
        <defs>
          <linearGradient id="gViolet" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#a78bfa"/>
            <stop offset="100%" stop-color="#f472b6"/>
          </linearGradient>
          <linearGradient id="gAmber" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#fbbf24"/>
            <stop offset="100%" stop-color="#f97316"/>
          </linearGradient>
          <linearGradient id="gRed" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#f87171"/>
            <stop offset="100%" stop-color="#ef4444"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="70" cy="70" r="60" stroke-width="12"/>
        <circle class="ring-track" cx="70" cy="70" r="60" stroke-width="12"
          stroke="${ringColor}"
          stroke-dasharray="${(pct*circ).toFixed(2)} ${circ}"
          stroke-dashoffset="0" stroke-linecap="round" fill="none"/>
      </svg>
      <div class="ring-center">
        <div class="ring-num" style="background:linear-gradient(135deg,${over?'#f87171,#ef4444':'#a78bfa,#f472b6'});-webkit-background-clip:text;-webkit-text-fill-color:transparent">${Math.round(tot.k)}</div>
        <div class="ring-lbl">kcal eaten</div>
      </div>
    </div>
    <div class="ring-sub" style="color:${over?'#f87171':'var(--muted2)'}">
      ${over?'<span style="color:#f87171">'+Math.abs(Math.round(rem))+' over</span> your target':'<b style="color:var(--text)">'+Math.round(rem)+'</b> kcal remaining · target '+T.kcal}
    </div>
  </div>

  <!-- Macros -->
  <div class="macro-row">
    <div class="macro-pill prot">
      <div class="macro-val" style="color:#34d399">${tot.p.toFixed(0)}<span style="font-size:13px;font-weight:600">g</span></div>
      <div class="macro-lbl">Protein</div>
      <div class="macro-pct">${Math.round(Math.min(tot.p/T.protein*100,100))}% of ${T.protein}g</div>
    </div>
    <div class="macro-pill carb">
      <div class="macro-val" style="color:#fbbf24">${tot.c.toFixed(0)}<span style="font-size:13px;font-weight:600">g</span></div>
      <div class="macro-lbl">Carbs</div>
      <div class="macro-pct">${Math.round(Math.min(tot.c/T.carbs*100,100))}% of ${T.carbs}g</div>
    </div>
    <div class="macro-pill fat">
      <div class="macro-val" style="color:#f87171">${tot.f.toFixed(0)}<span style="font-size:13px;font-weight:600">g</span></div>
      <div class="macro-lbl">Fat</div>
      <div class="macro-pct">${Math.round(Math.min(tot.f/T.fat*100,100))}% of ${T.fat}g</div>
    </div>
  </div>

  <!-- Log -->
  <div class="section" style="margin-top:20px">
    <div class="section-hdr">
      <span class="section-title">Today's log</span>
      ${log.length>0?`<span class="section-action" style="cursor:pointer" onclick="go('scan')">+ Add food</span>`:''}
    </div>
    <div class="card" style="overflow:hidden">
      ${log.length===0?`
        <div class="empty">
          <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 5v14M5 12h14"/></svg></div>
          <h3>Nothing logged yet</h3>
          <p>Tap <b>Add</b> below to log your first meal of the day</p>
        </div>`:
        log.map((e,i)=>`
        <div class="food-card">
          <div class="food-dot" style="background:${DOTS[i%DOTS.length]}"></div>
          <div class="food-info">
            <div class="food-name">${e.n}</div>
            <div class="food-chips">
              ${e.a?`<span class="chip">${e.a}</span>`:''}
              <span class="chip p">${e.p.toFixed(1)}g P</span>
              <span class="chip c">${e.c.toFixed(1)}g C</span>
              <span class="chip f">${e.f.toFixed(1)}g F</span>
            </div>
          </div>

          <button class="food-del" onclick="delEntry(${i})">×</button>
        </div>`).join('')}
    </div>
  </div>
  <div class="bot-pad"></div>`;
}

function delEntry(i){
  todayLog().splice(i,1);save();
  if(tab==='today')render();
  toast('Removed');
}

function saveNewIngredient(){
  const name=(document.getElementById('nin')?.value||'').trim();
  if(!name){toast('Enter a name');return;}
  const k=parseFloat(document.getElementById('nik')?.value)||0;
  const p=parseFloat(document.getElementById('nip')?.value)||0;
  const c=parseFloat(document.getElementById('nic')?.value)||0;
  const f=parseFloat(document.getElementById('nif')?.value)||0;
  if(S.customFoods.find(cf=>cf.n===name)){toast('Already saved: '+name);return;}
  S.customFoods.unshift({n:name,k,p,c,f,per:'100g'});
  save();toast('Saved: '+name);openIngredients();
}
function openEditIngredient(idx){
  const f=S.customFoods[idx];if(!f)return;
  showSheet('Edit Ingredient',`
    <div class="field"><label>Name</label><input id="ein" type="text" value="${f.n.replace(/"/g,'&quot;')}"></div>
    <div class="macro-inputs">
      <div class="field"><label>Kcal /100g</label><input id="eik" type="number" value="${f.k}"></div>
      <div class="field"><label>Protein g</label><input id="eip" type="number" value="${f.p}"></div>
      <div class="field"><label>Carbs g</label><input id="eic" type="number" value="${f.c}"></div>
      <div class="field"><label>Fat g</label><input id="eif" type="number" value="${f.f}"></div>
    </div>
    <button class="btn-grad" onclick="saveEditIngredient(${idx})">Save Changes</button>
    <button class="btn-ghost" style="margin-top:8px" onclick="openIngredients()">← Back</button>
  `);
}
function saveEditIngredient(idx){
  const name=(document.getElementById('ein')?.value||'').trim();
  if(!name){toast('Enter a name');return;}
  S.customFoods[idx]={
    n:name,
    k:parseFloat(document.getElementById('eik')?.value)||0,
    p:parseFloat(document.getElementById('eip')?.value)||0,
    c:parseFloat(document.getElementById('eic')?.value)||0,
    f:parseFloat(document.getElementById('eif')?.value)||0,

  save();toast('Updated: '+name);openIngredients();

function deleteIngredient(idx){
  const name=S.customFoods[idx]?.n||'';
  S.customFoods.splice(idx,1);
  save();toast('Removed: '+name);openIngredients();
}

// ── BARCODE SCANNER ────────────────────────────────────────────────────────────
let html5Scanner=null;
function openBarcode(){
  showSheet('Scan Barcode',`
    <div id="reader"></div>
    <div id="scan-status">Point camera at product barcode</div>
    <button class="btn-ghost" onclick="closeSheet()">Cancel</button>`);
  loadScript('https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js',()=>{
    html5Scanner=new Html5Qrcode('reader');
    html5Scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:260,height:100}},onBarcode,()=>{}).catch(e=>{
      document.getElementById('scan-status').textContent='Camera error: '+e;
    });
  });
}
async function onBarcode(code){
  if(html5Scanner){try{await html5Scanner.stop()}catch(e){}html5Scanner=null}
  const s=document.getElementById('scan-status');
  if(s)s.textContent='Looking up product…';
  try{
    const res=await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}?fields=product_name,nutriments,quantity`);
    const d=await res.json();
    if(d.status!==1)throw 0;
    const nm=d.product.nutriments;
    const food={n:d.product.product_name||'Product',
      k:nm['energy-kcal_100g']||0,p:nm['proteins_100g']||0,
      c:nm['carbohydrates_100g']||0,f:nm['fat_100g']||0,per:'100g'};
    // Save to custom foods if not already present
    if(!S.customFoods.find(f=>f.n===food.n)){
      S.customFoods.unshift(food);save();
    }
    closeSheet();
    openConfirm({...food,a:'100g'},true);
  }catch(e){
    const s2=document.getElementById('scan-status');
    if(s2)s2.textContent='⚠ Not found — try Search instead';
    setTimeout(()=>{closeSheet();openSearch(code)},1500);
  }
}

      Take a photo of the <b style="color:var(--text)">per 100g</b> table on the packaging. The app will read the values automatically.
    </p>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/>
      </svg>
      <p>Tap to open camera</p>
    </div>
    <button class="btn-ghost" onclick="closeSheet()">Cancel</button>`);

async function processPhoto(input){
  const file=input.files[0];if(!file)return;
  const url=URL.createObjectURL(file);
  const prev=document.getElementById('photo-preview');
  if(prev){prev.src=url;prev.style.display='block';}
  const st=document.getElementById('ocr-status');
  if(st){st.style.display='block';st.textContent='Reading label… may take 10–20s';}
  loadScript('https://unpkg.com/tesseract.js@4/dist/tesseract.min.js',async()=>{
    try{
      const r=await Tesseract.recognize(file,'eng',{logger:()=>{}});
      const parsed=parseLabel(r.data.text);
      closeSheet();openConfirm(parsed,true);
    }catch(e){
      const st2=document.getElementById('ocr-status');
      if(st2)st2.textContent='⚠ Could not read — enter manually';
      setTimeout(()=>{closeSheet();openManual()},1500);
    }
  });
}
function parseLabel(txt){
  const n=s=>{const m=s.match(/(\d+[\.,]?\d*)/);return m?parseFloat(m[1].replace(',','.')):0};
  const find=ps=>{for(const p of ps){const m=txt.match(p);if(m)return n(m[0])}return 0};
  return{n:'Label item',a:'100g',
    k:find([/energy[^\n]*?(\d+)\s*kcal/i,/calories[^\n]*?(\d+)/i,/(\d+)\s*kcal/i]),
    p:find([/protein[^\n]*?(\d+[\.,]?\d*)/i,/protei[^\n]*?(\d+[\.,]?\d*)/i]),
    c:find([/carbohydrate[^\n]*?(\d+[\.,]?\d*)/i,/carbs[^\n]*?(\d+[\.,]?\d*)/i]),
    f:find([/fat[^\n]*?(\d+[\.,]?\d*)/i,/lipid[^\n]*?(\d+[\.,]?\d*)/i])};
}

      <div class="result-dot"></div>

function openConfirm(food,isPer100=false){
  const s=isPer100?`
    <div class="field"><label>Amount (grams or ml)</label>
      <input id="ca" type="number" value="100" oninput="updateConfirm(${food.k},${food.p},${food.c},${food.f})">
    </div>`:
    `<div class="field"><label>Portion</label>
      <input id="cas" type="text" value="${food.a||'100g'}">
    </div>`;
  showSheet('Confirm & Add',`
    <div class="field"><label>Food name</label>
      <input id="cn" type="text" value="${(food.n||'').replace(/"/g,'&quot;')}">
    </div>
    ${s}
    <div class="confirm-macros">
      <div class="cm-item"><div id="ck" class="cm-val" style="color:#a78bfa">${Math.round(food.k)}</div><div class="cm-lbl">kcal</div></div>
      <div class="cm-item"><div id="cp" class="cm-val" style="color:#34d399">${food.p.toFixed(1)}</div><div class="cm-lbl">prot g</div></div>
      <div class="cm-item"><div id="cc" class="cm-val" style="color:#fbbf24">${food.c.toFixed(1)}</div><div class="cm-lbl">carbs g</div></div>
      <div class="cm-item"><div id="cf" class="cm-val" style="color:#f87171">${food.f.toFixed(1)}</div><div class="cm-lbl">fat g</div></div>
    </div>
    <button class="btn-grad" onclick="confirmAdd(${isPer100},${food.k},${food.p},${food.c},${food.f},${JSON.stringify(food.n||'')})">Add to Log</button>
    <button class="btn-ghost" onclick="saveIngredientOnly(${isPer100},${food.k},${food.p},${food.c},${food.f},${JSON.stringify(food.n||'')})">Save to Ingredients (no log)</button>
    <button class="btn-ghost" onclick="openManual({n:document.getElementById('cn').value,k:${food.k},p:${food.p},c:${food.c},f:${food.f}})">Edit macros</button>
    <button class="btn-ghost" onclick="closeSheet()">Cancel</button>`);
}
function updateConfirm(k,p,c,f){
  const a=parseFloat(document.getElementById('ca')?.value)||100;const r=a/100;
  document.getElementById('ck').textContent=Math.round(k*r);
  document.getElementById('cp').textContent=(p*r).toFixed(1);
  document.getElementById('cc').textContent=(c*r).toFixed(1);
  document.getElementById('cf').textContent=(f*r).toFixed(1);
}
function confirmAdd(isPer100,k,p,c,f,origName){
  const name=document.getElementById('cn')?.value.trim()||'Food';
  let ek,ep,ec,ef,ea;
  if(isPer100){
    const a=parseFloat(document.getElementById('ca')?.value)||100;const r=a/100;
    ek=k*r;ep=p*r;ec=c*r;ef=f*r;ea=a+'g';
    // Update name in customFoods if user edited it
    const existing=S.customFoods.find(cf=>cf.n===(origName||''));
    if(existing&&existing.n!==name){existing.n=name;}
    else if(!existing){S.customFoods.unshift({n:name,k,p,c,f,per:'100g'});}
    save();
  }else{ek=k;ep=p;ec=c;ef=f;ea=document.getElementById('cas')?.value||'';}
  todayLog().push({n:name,a:ea,k:ek,p:ep,c:ec,f:ef,ts:Date.now()});
  save();closeSheet();toast('Added: '+name);go('today');
}
function saveIngredientOnly(isPer100,k,p,c,f,origName){
  const name=document.getElementById('cn')?.value.trim()||'Food';
  if(isPer100){
    const existing=S.customFoods.find(cf=>cf.n===(origName||''));
    if(existing){existing.n=name;}
    else if(!S.customFoods.find(cf=>cf.n===name)){S.customFoods.unshift({n:name,k,p,c,f,per:'100g'});}
    save();closeSheet();toast('Saved to ingredients: '+name);
  }else{closeSheet();toast('Saved');}
}

/* ── helpers ── */
function getDayTotals(daysBack=30){
  const out=[];
  for(let i=daysBack-1;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const key=dk(d);const log=S.log[key]||[];
    const tot=log.reduce((a,e)=>({k:a.k+e.k,p:a.p+e.p,c:a.c+e.c,f:a.f+e.f}),{k:0,p:0,c:0,f:0});
    out.push({date:key,label:key.slice(5),logged:log.length>0,...tot});
  }
  return out;
}
function calcStreak(){
  let streak=0;
  for(let i=0;i<60;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const key=dk(d);
    if((S.log[key]||[]).length>0)streak++;
    else if(i>0)break; // today can be 0 and we still continue
  }
  return streak;
}

/* ── OVERVIEW ── */

  const days30=getDayTotals(30);
  const logged=days30.filter(d=>d.logged);

  const weekDays=getDayTotals(7);
  const weekLogged=weekDays.filter(d=>d.logged);

        </div>

      <div style="font-size:11px;color:var(--muted2);margin-top:8px">${adherePct}% of days on target this week</div>
    </div>

  <!-- 30-day mini chart -->
  <div class="section" style="margin-top:12px">
    <div class="card" style="padding:16px">
      <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">30-day calories</div>
      <div class="mini-bar-wrap">${miniBars}</div>

        <span style="font-size:11px;color:var(--muted2)"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#f87171;margin-right:4px"></span>Over</span>
        <span style="font-size:11px;color:var(--muted2)"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#fbbf24;margin-right:4px"></span>Under 75%</span>
      </div>
    </div>
  </div>

  <!-- Goals -->
  <div class="section" style="margin-top:12px">
    <div class="section-hdr"><span class="section-title">Goals</span></div>
    <div class="card" style="padding:16px">
      <div class="goal-row">
        <span class="goal-lbl">Current weight</span>
        <span class="goal-val">${latestWt?latestWt.v+' kg':'— (log in Progress → Weight)'}</span>

      <div class="goal-row">
        <span class="goal-lbl">Target weight</span>
        <div style="display:flex;align-items:center;gap:8px">
          <input id="goal-wt" type="number" step="0.5" value="${goalWt||''}" placeholder="e.g. 65"
            style="width:80px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
            border-radius:8px;padding:5px 8px;color:var(--text);font-size:14px;font-weight:700;outline:none;text-align:center">
          <button onclick="saveGoal()" style="padding:5px 12px;border:none;border-radius:8px;background:var(--v1);color:white;font-size:12px;font-weight:700;cursor:pointer">Save</button>

      ${toGo!==null?`

        <span class="goal-val" style="color:var(--muted2)">~${weeksEst} weeks</span>
      </div>`:''}`:
      '<div style="font-size:12px;color:var(--muted2);padding:4px 0">Set a target weight above to see your estimated timeline.</div>'}
      <div class="goal-row">
        <span class="goal-lbl">Daily deficit needed</span>
        <span class="goal-val" style="color:var(--v1)">${T.kcal} kcal (your target)</span>
      </div>

  </div>

  <!-- Macro weekly averages -->
  ${weekLogged.length?`
  <div class="section" style="margin-top:12px">
    <div class="section-hdr"><span class="section-title">This week's averages</span></div>
    <div class="card" style="overflow:hidden">
      ${[
        ['Protein','p',T.protein,'#34d399'],

function saveGoal(){
  const v=parseFloat(document.getElementById('goal-wt')?.value);
  if(!v||v<30||v>200){toast('Enter a valid target weight');return}
  S.goals.targetWeight=v;save();render();toast('Goal saved!');

/* ── CALORIES history ── */
function rCalHist(){
  const days30=getDayTotals(30);
  const logged=days30.filter(d=>d.logged);
  const avg=logged.length?Math.round(logged.reduce((s,d)=>s+d.k,0)/logged.length):0;
  const best=logged.length?Math.max(...logged.map(d=>d.k)):0;
  const onTarget=logged.filter(d=>d.k<=T.kcal*1.05&&d.k>0).length;

  return `
  <!-- Stats row -->
  <div class="overview-grid" style="grid-template-columns:1fr 1fr 1fr;padding:0 16px;margin-top:16px">
    <div class="ov-box" style="text-align:center;padding:12px">
      <div class="ov-val" style="font-size:22px;color:#34d399">${avg||'—'}</div>
      <div class="ov-lbl" style="font-size:10px">avg kcal</div>
    </div>
    <div class="ov-box" style="text-align:center;padding:12px">
      <div class="ov-val" style="font-size:22px;color:#a78bfa">${best||'—'}</div>
      <div class="ov-lbl" style="font-size:10px">best day</div>
    </div>
    <div class="ov-box" style="text-align:center;padding:12px">
      <div class="ov-val" style="font-size:22px;color:#fbbf24">${onTarget}</div>
      <div class="ov-lbl" style="font-size:10px">on target</div>
    </div>
  </div>

  <!-- 30-day bar chart -->
  <div class="section" style="margin-top:12px">
    <div class="card" style="padding:16px">
      <div style="font-size:12px;color:var(--muted2);margin-bottom:12px">Last 30 days vs ${T.kcal} kcal target</div>
      ${barChart30(days30)}
    </div>
  </div>

  <!-- Daily list (last 14) -->
  <div class="section" style="margin-top:12px">
    <div class="section-hdr"><span class="section-title">Daily log</span></div>
    <div class="card" style="overflow:hidden">
      ${days30.slice().reverse().filter(d=>d.logged).slice(0,14).map(d=>`
      <div class="hist-row">
        <span class="hist-date">${d.date}</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:10px;color:var(--muted2)">${d.p.toFixed(0)}g P</span>
          <span class="hist-val" style="color:${d.k>T.kcal?'#f87171':'#34d399'}">${Math.round(d.k)} kcal</span>
        </div>
      </div>`).join('') || '<div class="empty" style="padding:20px"><p>No days fully logged yet</p></div>'}
    </div>
  </div>`;
}

function barChart30(days){
  const W=320,H=80,px=4;
  const mx=Math.max(T.kcal*1.25,...days.map(d=>d.k),1);
  const bw=(W-px*2)/days.length-1.5;
  const ty=H-(T.kcal/mx*H);
  const bars=days.map((d,i)=>{
    const x=px+i*((W-px*2)/days.length);
    const bh=d.logged?Math.max(2,d.k/mx*H):2;
    const y=H-bh;
    const col=!d.logged?'rgba(255,255,255,.06)':d.k>T.kcal?'#f87171':'#a78bfa';
    const lbl=(i===0||i===14||i===29)?days[i].label.slice(3):'';
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${Math.max(bw,1).toFixed(1)}" height="${bh.toFixed(1)}" fill="${col}" rx="2"/>
      ${lbl?`<text x="${(x+bw/2).toFixed(0)}" y="${H+12}" font-size="8" fill="#64748b" text-anchor="middle">${lbl}</text>`:''}`;
  }).join('');
  return `<div class="chart-wrap"><svg class="chart" viewBox="0 0 ${W} ${H+14}" width="100%">
    <line x1="${px}" y1="${ty.toFixed(1)}" x2="${W-px}" y2="${ty.toFixed(1)}" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4 3" opacity=".6"/>
    ${bars}
  </svg></div>`;
}

/* ── WEIGHT ── */
function rWeight(){
  const wt=S.wt;
  const latest=wt[wt.length-1];
  const first=wt[0];
  const delta=latest&&first&&wt.length>1?(latest.v-first.v).toFixed(1):null;
  const goalWt=S.goals.targetWeight;
  return `
  <div class="stat-grid">
    <div class="stat-box">
      <div class="stat-val" style="background:linear-gradient(135deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${latest?latest.v:'—'}</div>
      <div class="stat-lbl">kg current</div>
      ${delta!==null?`<div class="stat-delta" style="color:${parseFloat(delta)<0?'#34d399':'#f87171'}">${parseFloat(delta)>0?'+':''}${delta} kg total</div>`:''}
    </div>
    <div class="stat-box">
      <div class="stat-val" style="color:${goalWt?'#34d399':'var(--muted2)'}">${goalWt||'—'}</div>
      <div class="stat-lbl">kg target</div>
      ${goalWt&&latest?`<div class="stat-delta" style="color:var(--muted)">${Math.abs(latest.v-goalWt).toFixed(1)} kg to go</div>`:'<div class="stat-delta" style="color:var(--muted)">Set in Overview</div>'}
    </div>
  </div>
  ${wt.length>1?`
  <div class="section" style="margin-top:14px">
    <div class="card" style="padding:16px">
      ${lineChartWithGoal(wt.map(e=>e.v),wt.map(e=>e.d.slice(5)),goalWt)}
    </div>
  </div>`:''}
  <div class="weight-entry">
    <input id="wi" type="number" step="0.1" placeholder="Weight in kg (e.g. 71.5)">
    <button class="btn-sm" onclick="logWeight()">Log</button>
  </div>
  <div class="section" style="margin-top:14px">
    <div class="section-hdr"><span class="section-title">History</span></div>
    <div class="card" style="overflow:hidden">
      ${wt.length===0?'<div class="empty" style="padding:24px"><p>Log your weight above to start tracking</p></div>':
        wt.slice().reverse().slice(0,14).map(e=>`
        <div class="hist-row">
          <span class="hist-date">${e.d}</span>
          <span class="hist-val">${e.v} kg</span>
        </div>`).join('')}
    </div>
  </div>`;
}

function logWeight(){
  const v=parseFloat(document.getElementById('wi')?.value);
  if(!v||v<30||v>300){toast('Enter valid weight');return}
  S.wt.push({d:dk(),v});save();render();toast('Weight logged!');
}

function lineChartWithGoal(vals,labels,goalVal){
  if(vals.length<2)return '';
  const W=300,H=80,px=8,py=10;
  const mn=Math.min(...vals,(goalVal||999))-.5;
  const mx=Math.max(...vals,(goalVal||0))+.5;
  const xs=vals.map((_,i)=>px+i*(W-2*px)/(vals.length-1));
  const ys=vals.map(v=>H-py-(v-mn)/(mx-mn)*(H-2*py));
  const path=xs.map((x,i)=>(i===0?'M':'L')+x.toFixed(1)+','+ys[i].toFixed(1)).join(' ');
  const area=path+` L${xs[xs.length-1].toFixed(1)},${H} L${xs[0].toFixed(1)},${H} Z`;
  const goalY=goalVal?H-py-(goalVal-mn)/(mx-mn)*(H-2*py):null;
  const lbl=[0,Math.floor(labels.length/2),labels.length-1];
  return `<div class="chart-wrap"><svg class="chart" viewBox="0 0 ${W} ${H+14}" width="100%">
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#wg)"/>
    ${goalY!==null?`<line x1="${px}" y1="${goalY.toFixed(1)}" x2="${W-px}" y2="${goalY.toFixed(1)}" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5 3" opacity=".8"/>
    <text x="${W-px+2}" y="${goalY.toFixed(0)}" font-size="8" fill="#34d399" alignment-baseline="middle">goal</text>`:''}
    <path d="${path}" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${xs.map((x,i)=>`<circle cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="2.5" fill="#a78bfa"/>`).join('')}
    ${lbl.map(i=>`<text x="${xs[i].toFixed(0)}" y="${H+12}" font-size="9" fill="#64748b" text-anchor="middle">${labels[i]}</text>`).join('')}
  </svg></div>`;
}

function lineChart(vals,labels,col){
  if(vals.length<2)return '';
  const W=300,H=80,px=8,py=10;
  const mn=Math.min(...vals)-.5,mx=Math.max(...vals)+.5;
  const xs=vals.map((_,i)=>px+i*(W-2*px)/(vals.length-1));
  const ys=vals.map(v=>H-py-(v-mn)/(mx-mn)*(H-2*py));
  const path=xs.map((x,i)=>(i===0?'M':'L')+x.toFixed(1)+','+ys[i].toFixed(1)).join(' ');
  const area=path+` L${xs[xs.length-1].toFixed(1)},${H} L${xs[0].toFixed(1)},${H} Z`;
  const lbl=[0,Math.floor(labels.length/2),labels.length-1];
  return `<div class="chart-wrap"><svg class="chart" viewBox="0 0 ${W} ${H+14}" width="100%">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity=".25"/>
      <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#ag)"/>
    <path d="${path}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${xs.map((x,i)=>`<circle cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="3" fill="${col}"/>`).join('')}
    ${lbl.map(i=>`<text x="${xs[i].toFixed(0)}" y="${H+12}" font-size="9" fill="#64748b" text-anchor="middle">${labels[i]}</text>`).join('')}
  </svg></div>`;
}

function barChart(vals,labels,target){
  const W=300,H=80,px=8;
  const mx=Math.max(target*1.2,...vals,1);
  const bw=(W-2*px)/vals.length-5;
  const ty=(H-(target/mx)*H).toFixed(1);
  const bars=vals.map((v,i)=>{
    const x=px+i*((W-2*px)/vals.length)+2;
    const bh=v===0?2:(v/mx)*H;
    const y=H-bh;
    const col=v>target?'#f87171':v===0?'rgba(255,255,255,.08)':'#a78bfa';
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="${col}" rx="4"/>
      <text x="${(x+bw/2).toFixed(0)}" y="${H+12}" font-size="8" fill="#64748b" text-anchor="middle">${labels[i]}</text>`;
  }).join('');
  return `<div class="chart-wrap"><svg class="chart" viewBox="0 0 ${W} ${H+14}" width="100%">
    <line x1="${px}" y1="${ty}" x2="${W-px}" y2="${ty}" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4 3" opacity=".6"/>
    ${bars}
  </svg></div>`;
}

function rMeasHist(){

    const pts=S.meas.filter(m=>m[k]);if(pts.length<2)return '';
    return `<div style="margin-bottom:10px">
      <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">${lbl}</div>

}

// ── Unit tables ──
const VOL_TO_ML = {
  tsp:5,teaspoon:5,teaspoons:5,
  tbsp:15,tablespoon:15,tablespoons:15,
  cup:240,cups:240,'half cup':120,'quarter cup':60,
  ml:1,milliliter:1,milliliters:1,millilitre:1,millilitres:1,
  cl:10,dl:100,
  l:1000,liter:1000,liters:1000,litre:1000,litres:1000,
  'fl oz':30,floz:30,
};
const MASS_TO_G = {
  g:1,gr:1,gram:1,grams:1,
  kg:1000,kilogram:1000,kilograms:1000,
  oz:28.35,ounce:28.35,ounces:28.35,
  lb:453.6,lbs:453.6,pound:453.6,pounds:453.6,
};
const WORD_NUM = {
  zero:0,a:1,an:1,one:1,two:2,three:3,four:4,five:5,
  six:6,seven:7,eight:8,nine:9,ten:10,eleven:11,twelve:12,
  half:.5,'a half':.5,'half a':.5,'half an':.5,
  quarter:.25,'a quarter':.25,'one quarter':.25,
  'a couple':2,couple:2,
};
// food-specific densities (g per ml)
const FOOD_DENSITY = {
  oil:0.92,butter:0.91,'olive oil':0.92,'vegetable oil':0.92,
  'coconut oil':0.92,'sunflower oil':0.92,'sesame oil':0.92,
  flour:0.59,'whole grain flour':0.59,'almond flour':0.48,
  sugar:0.85,'brown sugar':0.77,'powdered sugar':0.56,
  salt:1.2,milk:1.03,water:1.0,cream:1.0,yogurt:1.05,
  honey:1.4,'maple syrup':1.32,'soy sauce':1.1,
};

// ── Number parsing ──
function parseNum(str){
  str=str.trim().toLowerCase();
  // fractions like "1/2"
  const frac=str.match(/^(\d+)\s*\/\s*(\d+)$/);
  if(frac)return parseInt(frac[1])/parseInt(frac[2]);
  // decimals / integers
  const n=parseFloat(str);
  if(!isNaN(n))return n;
  // word numbers (longest first)
  const sorted=Object.keys(WORD_NUM).sort((a,b)=>b.length-a.length);
  for(const w of sorted)if(str===w||str.startsWith(w+' '))return WORD_NUM[w];
  return null;
}

// ── Parse one spoken sentence ──
function parseCookingSpeech(raw){
  let t=raw.toLowerCase()
    .replace(/i (just |)?(added|put in|poured|threw in|used|added in|added some|put|got)/g,'')
    .replace(/\b(adding|using|putting|pouring|just|now|also|and then|then|about)\b/g,' ')
    .replace(/\b(of the|of a|of an|of some|into the|into|in the|to the|in)\b/g,' ')
    .replace(/\s+/g,' ').trim();

  let amount=1, unit=null, unitG=null, foodRaw=t;

  // 1. try to extract leading number (digit or word)
  // Word numbers first (longest match)
  const wordNums=Object.keys(WORD_NUM).sort((a,b)=>b.length-a.length);
  let matched=false;
  for(const w of wordNums){
    if(t===w||(t.startsWith(w+' ')&&!t.startsWith(w+'s'))){
      amount=WORD_NUM[w]; foodRaw=t.slice(w.length).trim(); matched=true; break;
    }
  }
  if(!matched){
    const dm=t.match(/^([\d]+(?:[.,]\d+)?(?:\s*\/\s*\d+)?)\s*/);
    if(dm){amount=parseNum(dm[1].replace(',','.'));foodRaw=t.slice(dm[0].length).trim();}
  }

  // 2. extract unit from foodRaw
  const allUnits=[...Object.keys(VOL_TO_ML),...Object.keys(MASS_TO_G)]
    .sort((a,b)=>b.length-a.length);
  for(const u of allUnits){
    if(foodRaw===u||foodRaw.startsWith(u+' ')||foodRaw.startsWith(u+'s ')){
      unit=u;
      foodRaw=foodRaw.slice(u.length).replace(/^s?\s+/,'').trim();
      if(VOL_TO_ML[u])unitG={type:'vol',ml:VOL_TO_ML[u]};
      else if(MASS_TO_G[u])unitG={type:'mass',g:MASS_TO_G[u]};
      break;
    }
  }

  // 3. strip leading "of/the/a/an/some"
  foodRaw=foodRaw.replace(/^(of\s+)?(the |a |an |some )+/,'').trim();

  return{amount, unit, unitG, food:foodRaw};
}

// ── Convert parsed to grams ──
function toGrams(amount, unitG, foodName){
  if(!unitG) return amount; // no unit = treat as count, macros per item handled via match
  if(unitG.type==='mass') return amount * unitG.g;
  if(unitG.type==='vol'){
    // find density
    const fLow=foodName.toLowerCase();
    let density=1.0;
    for(const [k,v] of Object.entries(FOOD_DENSITY)){
      if(fLow.includes(k)){density=v;break;}
    }
    return amount * unitG.ml * density;
  }
  return amount * 50; // fallback
}

// ── Fuzzy match against food database ──
function fuzzyMatch(query, threshold=0.3){
  const db=allFoods();
  const qToks=query.toLowerCase().split(/[\s,\-\/]+/).filter(t=>t.length>2);
  if(!qToks.length) return null;

  let best=null, bestScore=threshold;
  for(const food of db){
    const cToks=food.n.toLowerCase().split(/[\s,\-\/\(\)]+/).filter(t=>t.length>2);
    let score=0;
    for(const q of qToks){
      for(const c of cToks){
        if(c===q)score+=1.0;
        else if(c.startsWith(q)||q.startsWith(c))score+=0.6;
        else if(c.includes(q)||q.includes(c))score+=0.3;
      }
    }
    score=score/Math.max(qToks.length,cToks.length);
    if(score>bestScore){bestScore=score;best=food;}
  }
  return best;
}

function toggleMic(){
  if(isListening){stopMic();}else{startMic();}
}

function startMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    toast('Speech not supported — try Chrome on Android');
    // Fallback: open a text input
    openCookTextInput();
    return;
  }
  SpeechRec=new SR();
  SpeechRec.lang='en-US';
  SpeechRec.continuous=false;
  SpeechRec.interimResults=true;

  SpeechRec.onresult=(e)=>{
    let interim='', final='';
    for(const r of e.results){
      if(r.isFinal)final+=r[0].transcript;
      else interim+=r[0].transcript;
    }
    const box=document.getElementById('transcript-box');
    if(box){
      box.textContent=final||interim||'Listening…';
      box.className='transcript-live'+(final?' final':'');
    }
    if(final.trim()) processSpeech(final.trim());
  };

  SpeechRec.onend=()=>{isListening=false;updateMicBtn();};
  SpeechRec.onerror=(e)=>{
    isListening=false;updateMicBtn();
    if(e.error!=='no-speech')toast('Mic error: '+e.error);
  };

  SpeechRec.start();
  isListening=true;
  updateMicBtn();
}

function stopMic(){
  if(SpeechRec)try{SpeechRec.stop()}catch(e){}
  isListening=false;
  updateMicBtn();
}

function updateMicBtn(){
  const btn=document.getElementById('mic-btn');
  if(btn){
    btn.className='mic-btn'+(isListening?' listening':'');
    const box=document.getElementById('transcript-box');
    if(box&&!isListening&&box.textContent==='Listening…')
      box.innerHTML='Say something like <b>"two teaspoons of olive oil"</b>';
  }
}

function processSpeech(text){
  isListening=false;
  updateMicBtn();

  const parsed=parseCookingSpeech(text);
  const match=fuzzyMatch(parsed.food);
  let amountG=parsed.unitG?toGrams(parsed.amount,parsed.unitG,parsed.food):parsed.amount*100;

  if(match){
    const ratio=amountG/100;
    COOK.items.push({
      text, food:match.n, amountG,
      k:match.k*ratio, p:match.p*ratio, c:match.c*ratio, f:match.f*ratio,
      matched:true
    });
  } else {
    COOK.items.push({text, food:parsed.food, amountG, k:0,p:0,c:0,f:0, matched:false});
    COOK.pending.push(parsed.food);
  }
  renderCookSheet();
}

function removeCookItem(i){COOK.items.splice(i,1);renderCookSheet();}

function resolveMissing(i){
  const item=COOK.items[i];
  // Open barcode scanner, on success update the item
  showSheet('Scan or Search: "'+item.text+'"',`
    <p style="font-size:13px;color:var(--muted2);margin-bottom:14px">Scan the barcode of this ingredient, or search below.</p>
    <div id="reader" style="margin-bottom:12px"></div>
    <div id="scan-status" style="font-size:13px;color:var(--muted2);text-align:center;margin-bottom:12px">Point camera at barcode</div>
    <div class="field"><input id="ris" type="search" placeholder="Or search…" oninput="renderResolveResults(this.value,${i})"></div>
    <div id="resolve-results"></div>
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.07)">
      <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:10px">Create new ingredient</div>
      <div class="field"><label>Name</label><input id="rnn" type="text" placeholder="e.g. Almond milk" value="${item.text}"></div>
      <div class="macro-inputs">
        <div class="field"><label>Kcal /100g</label><input id="rnk" type="number" placeholder="0"></div>
        <div class="field"><label>Protein g</label><input id="rnp" type="number" placeholder="0"></div>
        <div class="field"><label>Carbs g</label><input id="rnc" type="number" placeholder="0"></div>
        <div class="field"><label>Fat g</label><input id="rnf" type="number" placeholder="0"></div>
      </div>
      <button class="btn-ghost" onclick="resolveWithNew(${i})">Save & Apply</button>
    </div>
    <button class="btn-ghost" style="margin-top:8px" onclick="renderCookSheet()">← Back</button>
  `);
  setTimeout(()=>renderResolveResults('',i),100);
  loadScript('https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js',()=>{
    html5Scanner=new Html5Qrcode('reader');
    html5Scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:240,height:80}},
      async(code)=>{
        if(html5Scanner)try{await html5Scanner.stop()}catch(e){}
        document.getElementById('scan-status').textContent='Looking up…';
        try{
          const res=await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}?fields=product_name,nutriments`);
          const d=await res.json();if(d.status!==1)throw 0;
          const nm=d.product.nutriments;
          const food={n:d.product.product_name||'Product',k:nm['energy-kcal_100g']||0,
            p:nm['proteins_100g']||0,c:nm['carbohydrates_100g']||0,f:nm['fat_100g']||0,per:'100g'};
          if(!S.customFoods.find(f=>f.n===food.n)){S.customFoods.unshift(food);save();}
          applyResolvedFood(i,food);
        }catch(e){document.getElementById('scan-status').textContent='Not found — search below';}
      },()=>{});
  });
}

function renderResolveResults(q,idx){
  const el=document.getElementById('resolve-results');if(!el)return;
  const db=allFoods();
  const list=q.length<1?db.slice(0,10):db.filter(f=>f.n.toLowerCase().includes(q.toLowerCase())).slice(0,10);
  el.innerHTML=list.map(f=>`
    <div class="result-row" onclick='applyResolvedFood(${idx},${JSON.stringify(f)})'>
      <div class="result-dot"></div>
      <div class="result-info">
        <div class="result-name">${f.n}</div>
        <div class="result-meta">${f.k} kcal · ${f.p}g P per 100g</div>
      </div>
    </div>`).join('');
}

function applyResolvedFood(i,food){
  if(html5Scanner)try{html5Scanner.stop()}catch(e){}
  const item=COOK.items[i];
  const ratio=(item.amountG||100)/100;
  COOK.items[i]={...item,food:food.n,k:food.k*ratio,p:food.p*ratio,c:food.c*ratio,f:food.f*ratio,matched:true};
  if(!S.customFoods.find(f=>f.n===food.n)){S.customFoods.unshift(food);save();}
  renderCookSheet();toast('Matched: '+food.n);
}

function resolveWithNew(i){
  const name=(document.getElementById('rnn')?.value||'').trim();
  const k=parseFloat(document.getElementById('rnk')?.value)||0;
  const p=parseFloat(document.getElementById('rnp')?.value)||0;
  const c=parseFloat(document.getElementById('rnc')?.value)||0;
  const f=parseFloat(document.getElementById('rnf')?.value)||0;
  if(!name){toast('Enter ingredient name');return;}
  const food={n:name,k,p,c,f,per:'100g'};
  if(!S.customFoods.find(cf=>cf.n===name)){S.customFoods.unshift(food);save();}
  applyResolvedFood(i,food);
}

function finishCooking(mode){
  stopMic();
  const matched=COOK.items.filter(i=>i.matched);
  if(mode==='log'){
    matched.forEach(item=>{
      todayLog().push({n:item.food,a:item.amountG.toFixed(0)+'g',
        k:item.k,p:item.p,c:item.c,f:item.f,ts:Date.now()});
    });
    save();COOK=null;closeSheet();toast(`Added ${matched.length} ingredients to log`);go('today');
  } else {
    // prefill recipe builder with matched items
    draftRecipe={name:COOK.name,servings:1,
      ingredients:matched.map(i=>({n:i.food,a:i.amountG,k:i.k,p:i.p,c:i.c,f:i.f}))};
    COOK=null;renderCreateRecipe();
  }
}

function closeCookMode(){stopMic();closeSheet();}

// Text fallback for browsers without speech API
function openCookTextInput(){
  showSheet('Type Ingredient',`
    <p style="font-size:13px;color:var(--muted2);margin-bottom:12px">Type what you added (speech not available on this browser)</p>
    <div class="field"><input id="tti" type="text" placeholder="e.g. 2 tbsp olive oil, 200g chicken"></div>
    <button class="btn-grad" onclick="(()=>{const v=document.getElementById('tti').value.trim();if(v){processSpeech(v);}})()">Add</button>
    <button class="btn-ghost" style="margin-top:8px" onclick="renderCookSheet()">← Back</button>
  `);
  setTimeout(()=>document.getElementById('tti')?.focus(),120);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const now=new Date();
document.getElementById('header-date').textContent=`${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]}`;
go('today');
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
